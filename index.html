<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hızlı Deneme Alanı</title>
    
    <style>
        /* --- CSS ALANI --- */
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
        }

        .card {
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }

        button {
            padding: 10px 20px;
            font-size: 1rem;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #0056b3;
        }

        #output {
            margin-top: 20px;
            font-weight: bold;
            color: #333;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Selam!</h1>
        <p>Butona basarak JS'i test edebilirsin.</p>
        <button id="btn">Tıkla Bakalım</button>
        <div id="output"></div>
    </div>

    <script>
        // --- JS ALANI ---
        const button = document.getElementById('btn');
        const output = document.getElementById('output');

        button.addEventListener('click', () => {
            output.innerText = "Sistem çalışıyor! 🚀";
            console.log("Butona tıklandı.");
            
            // Arkaplan rengini rastgele değiştirme denemesi
            const randomColor = Math.floor(Math.random()*16777215).toString(16);
            document.body.style.backgroundColor = "#" + randomColor;
        });
    </script>

</body>
</html>
